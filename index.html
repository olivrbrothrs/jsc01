<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Número Secreto</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 60px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #mensagem { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Adivinhe o Número</h1>
    <p>Tente acertar o número secreto entre <strong>1 e 64</strong>.</p>
    
    <input type="number" id="palpite" min="1" max="64">
    <button onclick="verificarPalpite()">Palpitar</button>

    <div id="mensagem"></div>
    <p>Tentativas: <span id="contador">0</span></p>
</div>

<script>
    // Inicialização das variáveis
    const numeroSecreto = Math.floor(Math.random() * 64) + 1;
    let tentativas = 0;

    function verificarPalpite() {
        const input = document.getElementById('palpite');
        const msg = document.getElementById('mensagem');
        const displayContador = document.getElementById('contador');
        const palpite = Number(input.value);

        // Validação básica
        if (!palpite || palpite < 1 || palpite > 64) {
            msg.innerText = "Por favor, digite um número entre 1 e 64.";
            msg.style.color = "orange";
            return;
        }

        tentativas++;
        displayContador.innerText = tentativas;

        if (palpite === numeroSecreto) {
            msg.innerText = `🎉 Parabéns! Você acertou em ${tentativas} tentativas!`;
            msg.style.color = "green";
            input.disabled = true; // Desabilita o campo após vencer
        } else if (palpite < numeroSecreto) {
            msg.innerText = "O número secreto é MAIOR! ↑";
            msg.style.color = "blue";
        } else {
            msg.innerText = "O número secreto é MENOR! ↓";
            msg.style.color = "red";
        }

        // Limpa o input para a próxima tentativa
        input.value = '';
        input.focus();
    }
</script>

</body>
</html>
